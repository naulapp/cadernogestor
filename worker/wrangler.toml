# Nome do Worker = projeto na Cloudflare (Git: naulapp/cadernogestor, raiz da build: /worker).
# Wrangler 3.109+ pode sugerir PR se nome/build divergirem — mantenha alinhado ao painel.
name = "cadernogestor"
main = "src/index.js"
compatibility_date = "2024-01-01"

# Crie o bucket no painel R2 e coloque o nome exato abaixo (pode ser diferente do name do Worker).
[[r2_buckets]]
binding = "PONTO_BUCKET"
bucket_name = "cadernogestor-ponto"

# Secrets: painel Workers → Configurações → Variáveis e segredos
#   FIREBASE_SERVICE_ACCOUNT  |  SESSION_SECRET
# Opcional: restrinja CORS ao seu GitHub Pages (URL exata, sem barra no final).
[vars]
ALLOWED_ORIGIN = "*"
